# RBAC for the control plane to manage data plane pods in its own namespace
# (AC-A1/A2/A3). The client-go orchestrator creates one pod per session, polls it
# to Ready (get), and deletes it on terminate/snapshot. Namespaced Role (not
# ClusterRole): session pods run in the control plane's own namespace.
#
# Applied by Flux alongside deployment.yaml into the session-platform namespace
# (cluster/session-platform.yaml). The namespace is intentionally omitted so the
# objects land in the kustomization's target namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  labels:
    app: control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-pods
  labels:
    app: control-plane
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-pods
  labels:
    app: control-plane
subjects:
  - kind: ServiceAccount
    name: control-plane
roleRef:
  kind: Role
  name: control-plane-pods
  apiGroup: rbac.authorization.k8s.io
