# Control plane Deployment. Serves the REST API (/api/v1) and the embedded SPA
# on one port (8080), orchestrating data plane pods (AC-A1) via the in-cluster
# client-go orchestrator. It runs as the control-plane ServiceAccount (see
# rbac.yaml) and provisions session pods in this same namespace, resolving the
# namespace from the mounted service account (no SESSION_NAMESPACE env needed).
#
# The image is published by .github/workflows/docker-build-push.yaml. The
# namespace is created by flux-cd-apps (cluster/session-platform.yaml) with the
# external-secrets/github label, which provisions the `ghcr` pull secret used
# below. The `gitops-repository` pod annotation is injected by Flux.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: ghcr.io/dlddu/session-platform:latest
          ports:
            - containerPort: 8080
          env:
            - name: CP_ADDR
              value: ":8080"
            - name: DATA_PLANE_IMAGE
              value: "alpine:3.20" # placeholder session workload (see data-plane/)
            - name: CRIU_ENABLED
              value: "false" # gated off until a verified runtime exists
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
