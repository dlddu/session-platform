name: e2e

# Full-stack e2e against a kind-deployed stub SUT (deploy/): build the combined
# image, load it into kind, apply the manifests, then run the Go API suite and
# the Playwright browser suite against the NodePort-exposed control-plane.
#
# Path-filtered so it runs only when the control-plane, web, deploy manifests, or
# this workflow change (plus on-demand). Unrelated PRs don't trigger it; the
# lint/unit/build jobs in ci.yml still run on every PR.
on:
  pull_request:
    paths:
      - "control-plane/**"
      - "web/**"
      - "deploy/**"
      - "k8s/**" # deploy/ overlay builds on the k8s/ base
      - "scripts/e2e/**"
      - "Makefile"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    name: e2e (kind + API + browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Creates a kind cluster from deploy/kind-config.yaml (installs kind +
      # kubectl on the runner). cluster_name matches the config so the
      # idempotent make e2e-up below reuses it instead of recreating.
      - name: create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.24.0
          cluster_name: session-platform
          config: deploy/kind-config.yaml

      # Build the combined image, load it into kind, apply deploy/, wait for the
      # rollouts, and poll the SUT at http://localhost:8080 (host :8080 -> node
      # :30080 via the extraPortMapping). No port-forward needed.
      - name: deploy SUT
        run: make e2e-up

      - name: API e2e (go, -tags=e2e)
        working-directory: control-plane
        env:
          E2E_BASE_URL: http://localhost:8080
        run: go test -tags=e2e -v ./test/...

      - name: install web deps
        working-directory: web
        run: npm ci

      - name: install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: browser e2e (playwright)
        working-directory: web
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npx playwright test

      - name: upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 7

      - name: SUT diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl describe deploy/control-plane || true
          kubectl logs deploy/control-plane --tail=200 || true
