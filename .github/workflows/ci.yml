name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  control-plane:
    name: control-plane (lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go vet
        working-directory: control-plane
        run: go vet ./...
      - name: gofmt check
        working-directory: control-plane
        run: test -z "$(gofmt -l .)"
      - name: unit tests
        working-directory: control-plane
        run: go test ./...

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        working-directory: web
        run: npm install
      - name: typecheck
        working-directory: web
        run: npm run lint
      - name: build
        working-directory: web
        run: npm run build

  image:
    name: docker image (combined API + SPA)
    runs-on: ubuntu-latest
    needs: [control-plane, web]
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -f control-plane/Dockerfile -t session-platform/control-plane:ci .

  integration:
    name: integration (opt-in, happy path)
    runs-on: ubuntu-latest
    # Opt-in: runs on demand or when explicitly enabled. The real job will spin
    # up kind + Redis (deploy/) first; today it runs the tagged harness with
    # stub adapters. CRIU scenarios stay skipped (see docs/criu-verification.md).
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: integration harness
        working-directory: control-plane
        run: go test -tags=integration ./...
