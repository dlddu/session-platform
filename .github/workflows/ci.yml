name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  control-plane:
    name: control-plane (lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go vet
        working-directory: control-plane
        run: go vet ./...
      - name: gofmt check
        working-directory: control-plane
        run: test -z "$(gofmt -l .)"
      - name: unit tests
        working-directory: control-plane
        run: go test ./...

  data-plane:
    name: data-plane (lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go vet
        working-directory: data-plane
        run: go vet ./...
      - name: gofmt check
        working-directory: data-plane
        run: test -z "$(gofmt -l .)"
      - name: unit tests
        working-directory: data-plane
        run: go test ./...

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install
        working-directory: web
        run: npm install
      - name: typecheck
        working-directory: web
        run: npm run lint
      - name: build
        working-directory: web
        run: npm run build

  image:
    name: docker image (combined API + SPA)
    runs-on: ubuntu-latest
    needs: [control-plane, web]
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -f control-plane/Dockerfile -t session-platform/control-plane:ci .

  data-plane-image:
    name: docker image (data plane agent)
    runs-on: ubuntu-latest
    needs: [data-plane]
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -f data-plane/Dockerfile -t session-platform/data-plane:ci .

  integration:
    name: integration (happy path)
    runs-on: ubuntu-latest
    # In-process happy-path harness (build tag `integration`): mounts the API
    # handlers over the in-memory stub adapters, so there is no external infra
    # and it runs on every PR alongside the unit tests. The deployed kind-SUT
    # version of these scenarios lives in e2e.yml. CRIU scenarios stay skipped
    # unless CRIU_ENABLED=1 (see docs/criu-verification.md).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: integration harness
        working-directory: control-plane
        run: go test -tags=integration ./...

  envtest:
    name: envtest (real-apiserver CAS/Lease)
    runs-on: ubuntu-latest
    # Real kube-apiserver + etcd conflict suite (AC-C1 single-winner) in the
    # isolated nested module. controller-runtime/envtest lives only there, so
    # the main module gains no runtime dependency. `make test-envtest`
    # provisions the apiserver/etcd binaries via setup-envtest.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: real-apiserver conflict tests
        run: make test-envtest
