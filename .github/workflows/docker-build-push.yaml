name: Build and Push Docker Image to GHCR

# Builds the single combined control-plane image (Go API + embedded React SPA,
# see control-plane/Dockerfile) and publishes it to GitHub Container Registry so
# the cluster (flux-cd-apps) can pull and deploy it. ci.yml only *builds* the
# image for validation; this workflow is what actually publishes a pullable tag.

on:
  push:
    branches: [main]
    paths:
      - "control-plane/**"
      - "web/**"
      - ".github/workflows/docker-build-push.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: build & push control-plane image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: control-plane/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
