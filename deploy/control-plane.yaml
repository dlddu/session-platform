# Control plane Deployment + Service. Serves the REST API and the embedded SPA
# on one port (8080). The control plane orchestrates data plane pods (AC-A1);
# in this scaffolding the orchestrator is a stub, so no RBAC for pod management
# is wired yet.
#
# TODO(rbac): when the k8s adapter drives real pods, add a ServiceAccount +
# Role/RoleBinding granting pods create/delete in the session namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  labels: { app: control-plane }
spec:
  replicas: 1
  selector:
    matchLabels: { app: control-plane }
  template:
    metadata:
      labels: { app: control-plane }
    spec:
      containers:
        - name: control-plane
          image: session-platform/control-plane:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CP_ADDR
              value: ":8080"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: SESSION_NAMESPACE
              value: "sessions"
            - name: CRIU_ENABLED
              value: "false" # gated off until a verified runtime exists
          readinessProbe:
            httpGet: { path: /api/v1/healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
spec:
  selector: { app: control-plane }
  ports:
    - port: 80
      targetPort: 8080
