# Control plane Deployment + Service. Serves the REST API and the embedded SPA
# on one port (8080). The control plane orchestrates data plane pods (AC-A1) via
# the in-cluster client-go orchestrator, which runs as the control-plane
# ServiceAccount (see rbac.yaml) and provisions session pods in this same
# namespace — it resolves the namespace from the mounted service account, so no
# SESSION_NAMESPACE env is needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  labels: { app: control-plane }
spec:
  replicas: 1
  selector:
    matchLabels: { app: control-plane }
  template:
    metadata:
      labels: { app: control-plane }
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: session-platform/control-plane:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CP_ADDR
              value: ":8080"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: DATA_PLANE_IMAGE
              value: "alpine:3.20" # placeholder session workload (see data-plane/)
            - name: CRIU_ENABLED
              value: "false" # gated off until a verified runtime exists
          readinessProbe:
            httpGet: { path: /api/v1/healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
# NodePort (deploy/ only) so the e2e suites reach the SUT through the kind
# extraPortMapping (host :8080 -> node :30080). Production k8s/service.yaml
# keeps a ClusterIP Service fronted by the cluster ingress.
apiVersion: v1
kind: Service
metadata:
  name: control-plane
spec:
  type: NodePort
  selector: { app: control-plane }
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
